<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Register</h2>
  <form onsubmit="return validateRegister()">
    <label>Full Name:</label>
    <input type="text" id="name" placeholder="Enter Name" required><br><br>
    
    <label>Email:</label>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>
    
    <label>Password:</label>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>
    
    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>
    
    <button type="submit">Register</button>
  </form>

  <script>
    function validateRegister() {
      let password = document.getElementById("password").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 6) {
        alert("Password must be at least 6 characters long!");
        return false;
      }
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
      }
      alert("Registration successful");
          window.location.href = "login.html";  
      return false;
    }


  </script>
</body>
</html>
